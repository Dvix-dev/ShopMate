<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="David Escutia de Haro">
    <meta name="author" content="Dvix">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="assets/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <title>ShopMate</title>
</head>

<header>
  <h1><img src="assets/logo.png" alt="Logo"> ShopMate</h1>
  <div id="user-info" class="user-info hidden">
    <span id="user-email" title="Identificado como"></span>
    <button type="button" id="logout-btn" title="Cerrar sesión">Salir</button>
  </div>
</header>

<body>
  <div id="app-content" class="app-content hidden">
    <div class="container">
    <div id="list-header">
      <h2>Lista de Compra Conjunta</h2>
    </div>

    <form id="checklist">
      <!-- Los ítems se insertarán aquí por JS -->
    </form>

    <div class="input-group">
      <input type="text" id="item-input" placeholder="Nuevo item" />
      <button type="button" id="add-btn">Añadir</button>
    </div>

    <button type="button" id="validar-btn">Validar compra ✔</button>
    </div>
  </div>

  <div id="nota-popup" class="popup hidden">
    <div class="popup-content">
      <div class="popup-close" id="popup-close">❌</div>
      <h3 id="popup-titulo"></h3>
      <p id="popup-nota"></p>
    </div>
  </div>

  <div id="auth-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="auth-title" aria-describedby="auth-help">
    <div class="modal-card">
      <h3 id="auth-title">Identifícate</h3>
      <p id="auth-help" class="modal-help">Te enviaremos un enlace a tu correo para iniciar sesión. Sin contraseñas: solo un click en el email.</p>

      <form id="auth-form" novalidate>
        <label for="auth-email" class="modal-label">Tu correo</label>
        <input type="email" id="auth-email" name="email"
               placeholder="ejemplo@correo.com" required
               autocomplete="email" inputmode="email"
               spellcheck="false" autocapitalize="off" />
        <div class="modal-actions">
          <button type="button" id="auth-cancel" class="hidden">Cancelar</button>
          <button type="submit" id="auth-send">Enviar enlace</button>
        </div>
      </form>

      <div id="auth-error" class="modal-error hidden" role="alert" aria-live="polite"></div>
      <div id="auth-message" class="modal-message hidden" role="status" aria-live="polite"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
